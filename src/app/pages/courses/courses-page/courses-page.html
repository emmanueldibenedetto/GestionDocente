<h2 class="mb-3">Mis Cursos</h2>

<button (click)="goToCreate()">➕ Crear Curso</button>

@if(errorMessage()){
  <p class="text-red">{{ errorMessage() }}</p>
}

@if(courses().length === 0){
  <p>No hay cursos cargados.</p>
} @else {
  <ul>
    @for (c of courses(); track c.id) {
      <li class="mb-2">
        <a routerLink='/course/detail/{{c.id}}'><strong>{{ c.name }}</strong></a> — {{ c.school }}

        <button (click)="editCourse(c.id!)">✏️ Editar</button>
        <button (click)="deleteCourse(c.id!)">🗑 Eliminar</button>
      </li>
    }
  </ul>
}
